<html lang="en">
<head>
<meta charset="UTF-8">

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API client ──────────────────────────────────────────────────────
const API_BASE = "http://localhost:8000";

const api = {
  async getApplications() {
    const r = await fetch(`${API_BASE}/applications`);
    if (!r.ok) throw new Error(`GET /applications ${r.status}`);
    return r.json();
  },
  async getStats() {
    const r = await fetch(`${API_BASE}/stats`);
    if (!r.ok) throw new Error(`GET /stats ${r.status}`);
    return r.json();
  },
  async updateStatus(id, status) {
    const r = await fetch(`${API_BASE}/applications/${id}/status`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
    if (!r.ok) throw new Error(`PATCH /applications/${id}/status ${r.status}`);
    return r.json();
  },
  async addApplication(body) {
    const r = await fetch(`${API_BASE}/applications`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`POST /applications ${r.status}`);
    return r.json();
  },
  async run() {
    const r = await fetch(`${API_BASE}/run`, { method: "POST" });
    if (!r.ok) throw new Error(`POST /run ${r.status}`);
    return r.json();
  },
  async generate(job) {
    const r = await fetch(`${API_BASE}/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(job),
    });
    if (!r.ok) throw new Error(`POST /generate ${r.status}`);
    return r.json();
  },
  async submitReply(id, text) {
    const r = await fetch(`${API_BASE}/applications/${id}/reply`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (!r.ok) throw new Error(`POST /applications/${id}/reply ${r.status}`);
    return r.json();
  },
  async chat(app_id, message, history) {
    const r = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ app_id, message, history }),
    });
    if (!r.ok) throw new Error(`POST /chat ${r.status}`);
    return r.json();
  },
};

// ── Helpers ─────────────────────────────────────────────────────────
function scoreStyle(s) {
  const n = parseFloat(s);
  if (!s || isNaN(n)) return { background: "var(--sand-100)", color: "var(--color-text-muted)" };
  if (n >= 8) return { background: "var(--color-success-soft)", color: "var(--color-success)" };
  if (n >= 5) return { background: "var(--color-warning-soft)", color: "var(--color-warning)" };
  return { background: "var(--color-danger-soft)", color: "var(--color-danger)" };
}

function StatusBadge({ status }) {
  return (
    <div className={`badge badge-${status || "applied"}`}>
      <div className="badge-dot"></div>
      {status || "applied"}
    </div>
  );
}

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="toast">
      <IconCheck /> {message}
    </div>
  );
}

function ErrorBanner({ message, onRetry }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "10px",
      padding: "12px 16px", borderRadius: "var(--radius-md)",
      background: "var(--color-danger-soft)", color: "var(--color-danger)",
      border: "1px solid oklch(55% 0.18 25 / 0.2)",
      fontSize: "var(--text-sm)", marginBottom: "16px",
    }}>
      <IconWarn />
      <span style={{ flex: 1 }}>
        <strong>Cannot reach API</strong> — make sure the backend is running: <code style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)" }}>python -m uvicorn job_agent.api:app --reload</code>
      </span>
      {onRetry && (
        <button className="btn btn-secondary btn-sm" onClick={onRetry} style={{ gap: "5px" }}>
          <IconRefresh /> Retry
        </button>
      )}
    </div>
  );
}

// ── Sidebar ─────────────────────────────────────────────────────────

              <circle cx="9" cy="7" r="3.5"/>

              <path d="M12.5 3.5l1.5-1.5M5.5 3.5L4 2M9 2V0.5"/>
            </svg>
          </div>
          <div className="brand-name">Job Agent</div>

        </div>

      <div className="sidebar-footer">

// ── Dashboard Page ───────────────────────────────────────────────────
function DashboardPage({ setPage }) {
  const [stats, setStats] = useState(null);
  const [apps, setApps] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  async function load() {
    setLoading(true); setError(null);
    try {
      const [s, a] = await Promise.all([api.getStats(), api.getApplications()]);
      setStats(s); setApps(a);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }
  useEffect(() => { load(); }, []);

  const recent = [...apps].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 4);

  if (loading) return <div className="page-body" style={{ color: "var(--color-text-muted)", fontSize: "var(--text-sm)" }}>Loading…</div>;

  return (
    <div className="page-body">
      {error && <ErrorBanner message={error} onRetry={load} />}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">Applications</div>
          <div className="stat-value">{stats?.total ?? apps.length}</div>
          <div className="stat-sub">total logged</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Interview rate</div>
          <div className="stat-value" style={{ color: "var(--color-warning)" }}>{stats?.interview_rate_pct ?? 0}%</div>
          <div className="stat-sub">{stats?.counts?.interview ?? 0} interviews</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Offers</div>
          <div className="stat-value" style={{ color: "var(--color-success)" }}>{stats?.counts?.offer ?? 0}</div>
          <div className="stat-sub">{stats?.offer_rate_pct ?? 0}% offer rate</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pending</div>
          <div className="stat-value" style={{ color: "var(--terra-400)" }}>{stats?.counts?.applied ?? 0}</div>
          <div className="stat-sub">awaiting reply</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
        {/* Pipeline */}
        <div className="pipeline-card">
          <div className="section-title">Pipeline</div>
          {[
            { s: "applied",   color: "var(--color-status-applied)" },
            { s: "interview", color: "var(--color-status-interview)" },
            { s: "offer",     color: "var(--color-status-offer)" },
            { s: "rejected",  color: "var(--color-text-muted)" },
          ].map(({ s, color }) => {
            const n = stats?.counts?.[s] ?? 0;
            const total = stats?.total ?? 1;
            return (
              <div className="pipe-row" key={s}>
                <div className="pipe-name" style={{ color }}>{s}</div>
                <div className="pipe-track">
                  <div className="pipe-fill" style={{ width: `${total ? n / total * 100 : 0}%`, background: color }}></div>
                </div>
                <div className="pipe-count">{n}</div>
              </div>
            );
          })}
        </div>

        {/* Recent */}
        <div className="pipeline-card">
          <div className="section-title">Recent applications</div>
          {recent.length === 0 && (
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-muted)", padding: "8px 0" }}>No applications yet.</div>
          )}
          {recent.map(app => (
            <div key={app.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--color-border)" }}>
              <div>
                <div style={{ fontSize: "var(--text-sm)", fontWeight: 500, color: "var(--color-text-primary)" }}>{app.title}</div>
                <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)" }}>{app.company} · {app.date}</div>
              </div>
              <StatusBadge status={app.status} />
            </div>
          ))}
          <div style={{ marginTop: "12px" }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage("applications")}>View all →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Applications Page ────────────────────────────────────────────────
function ApplicationsPage({ onSelect }) {
  const [apps, setApps] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title: "", company: "", location: "Madrid", source: "manual", link: "" });
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  async function load() {
    setLoading(true); setError(null);
    try { setApps(await api.getApplications()); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }
  useEffect(() => { load(); }, []);

  async function handleStatusChange(id, newStatus) {
    try {
      await api.updateStatus(id, newStatus);
      setApps(apps.map(a => a.id === id ? { ...a, status: newStatus } : a));
      setToast("Status updated");
    } catch (e) { setToast("Error: " + e.message); }
  }

  async function handleAdd() {
    if (!form.title || !form.company) return;
    setSaving(true);
    try {
      const added = await api.addApplication(form);
      setApps(prev => [...prev, added]);
      setShowModal(false);
      setForm({ title: "", company: "", location: "Madrid", source: "manual", link: "" });
      setToast("Application added");
    } catch (e) { setToast("Error: " + e.message); }
    finally { setSaving(false); }
  }

  const filtered = apps.filter(a => {
    const q = search.toLowerCase();
    const matchSearch = !q || a.title?.toLowerCase().includes(q) || a.company?.toLowerCase().includes(q);
    const matchFilter = filter === "all" || a.status === filter;
    return matchSearch && matchFilter;
  });

  return (
    <div className="page-body">
      {error && <ErrorBanner message={error} onRetry={load} />}

      <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, minWidth: "200px" }}>
          <div style={{ position: "absolute", left: "10px", top: "50%", transform: "translateY(-50%)", color: "var(--color-text-muted)", pointerEvents: "none", display: "flex" }}>
            <IconSearch />
          </div>
          <input className="field-input" style={{ paddingLeft: "34px", width: "100%" }} placeholder="Search jobs or companies…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {["all", "applied", "interview", "offer", "rejected"].map(f => (
          <div key={f} className="badge" style={{
            cursor: "pointer", padding: "6px 12px",
            background: filter === f ? "var(--terra-100)" : "var(--color-surface-raised)",
            color: filter === f ? "var(--terra-500)" : "var(--color-text-secondary)",
            border: `1px solid ${filter === f ? "var(--terra-300)" : "var(--color-border)"}`,
          }} onClick={() => setFilter(f)}>{f}</div>
        ))}
        <button className="btn btn-secondary btn-sm" onClick={load} style={{ gap: "5px" }}>
          <IconRefresh /> Refresh
        </button>
      </div>

      {loading ? (
        <div style={{ color: "var(--color-text-muted)", fontSize: "var(--text-sm)" }}>Loading…</div>
      ) : (
        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", overflow: "hidden", boxShadow: "var(--shadow-xs)" }}>
          <table className="data-table">
            <thead>
              <tr><th>Role</th><th>Company</th><th>Score</th><th>Source</th><th>Date</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(app => (
                <tr key={app.id} style={{ cursor: "pointer" }} onClick={() => onSelect(app)}>
                  <td>
                    <div style={{ fontWeight: 500, color: "var(--color-text-primary)" }}>{app.title}</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>{app.location}</div>
                  </td>
                  <td>{app.company}</td>
                  <td>
                    <div style={{ ...scoreStyle(app.score), width: "36px", height: "28px", borderRadius: "var(--radius-sm)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: "var(--text-sm)" }}>
                      {app.score || "—"}
                    </div>
                  </td>
                  <td><div className="source-badge">{app.source}</div></td>
                  <td style={{ color: "var(--color-text-muted)", fontSize: "var(--text-xs)" }}>{app.date}</td>
                  <td>
                    <select className="field-input" style={{ padding: "4px 8px", fontSize: "var(--text-xs)", width: "auto" }}
                      value={app.status || "applied"}
                      onClick={e => e.stopPropagation()}
                      onChange={e => { e.stopPropagation(); handleStatusChange(app.id, e.target.value); }}>
                      {["applied", "interview", "offer", "rejected"].map(s => <option key={s}>{s}</option>)}
                    </select>
                  </td>
                  <td>
                    <button className="btn-icon" onClick={e => { e.stopPropagation(); onSelect(app); }}>
                      <IconDoc />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length === 0 && (
            <div className="empty-state">
              <div className="empty-state-title">No applications found</div>
              <div className="empty-state-desc">{apps.length === 0 ? "Run the agent or add one manually." : "Try adjusting your filter."}</div>
            </div>
          )}
        </div>
      )}

      {/* Add modal */}
      {showModal && (
        <div className="modal-backdrop" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Add application</div>
            <div className="field">
              <div className="field-label">Job title *</div>
              <input className="field-input" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="AI Engineer" />
            </div>
            <div className="field">
              <div className="field-label">Company *</div>
              <input className="field-input" value={form.company} onChange={e => setForm({ ...form, company: e.target.value })} placeholder="Company name" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <div className="field">
                <div className="field-label">Location</div>
                <input className="field-input" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} />
              </div>
              <div className="field">
                <div className="field-label">Source</div>
                <select className="field-input" value={form.source} onChange={e => setForm({ ...form, source: e.target.value })}>
                  {["manual", "linkedin", "remotive", "infojobs", "tecnoempleo", "arbeitnow", "landing.jobs"].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="field">
              <div className="field-label">Job link</div>
              <input className="field-input" value={form.link} onChange={e => setForm({ ...form, link: e.target.value })} placeholder="https://…" />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAdd} disabled={saving || !form.title || !form.company}>
                {saving ? "Saving…" : "Add application"}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}

      <button className="btn btn-primary"
        style={{ position: "fixed", bottom: "24px", right: "24px", borderRadius: "var(--radius-full)", boxShadow: "var(--shadow-lg)", padding: "12px 20px", gap: "6px" }}
        onClick={() => setShowModal(true)}>

      </button>
    </div>
  );
}

// ── Mock interview chatbot ─────────────────────────────────────────────
function MockInterviewChat({ appId }) {
  const [messages, setMessages] = useState([{
    role: "assistant",
    content: "Hi! I'm your mock interviewer. Tell me about yourself, or ask me to fire a question.",
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function send() {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input.trim() };
    const next = [...messages, userMsg];
    setMessages(next);
    setInput("");
    setLoading(true);
    try {
      const res = await api.chat(appId, userMsg.content, messages.slice(-6));
      setMessages(prev => [...prev, { role: "assistant", content: res.reply }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: "assistant", content: "Error: " + e.message }]);
    } finally { setLoading(false); }
  }

  return (
    <div style={{ border: "1px solid var(--color-border)", borderRadius: "var(--radius-lg)", overflow: "hidden" }}>
      <div style={{ height: "260px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "8px", padding: "14px" }}>
        {messages.map((m, i) => (
          <div key={i} style={{
            alignSelf: m.role === "user" ? "flex-end" : "flex-start",
            maxWidth: "85%", padding: "8px 12px", borderRadius: "12px",
            background: m.role === "user" ? "var(--terra-100)" : "var(--sand-100)",
            fontSize: "var(--text-sm)", color: "var(--color-text-body)", lineHeight: "var(--leading-relaxed)",
            border: `1px solid ${m.role === "user" ? "var(--terra-200)" : "var(--color-border)"}`,
          }}>{m.content}</div>
        ))}
        {loading && <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)", fontStyle: "italic" }}>Thinking…</div>}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: "flex", gap: "8px", padding: "10px 14px", borderTop: "1px solid var(--color-border)", background: "var(--color-surface)" }}>
        <input className="field-input" style={{ flex: 1 }} placeholder="Your answer or a question…"
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()} />
        <button className="btn btn-primary btn-sm" onClick={send} disabled={loading || !input.trim()} style={{ gap: "5px" }}>
          <IconSend /> Send
        </button>
      </div>
    </div>
  );
}

// ── HR reply section ───────────────────────────────────────────────────
function HRReplySection({ app, onStatusUpdate }) {
  const [text, setText] = useState("");
  const [classifying, setClassifying] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  async function classify() {
    if (!text.trim()) return;
    setClassifying(true); setError(null);
    try {
      const r = await api.submitReply(app.id, text);
      setResult(r);
      onStatusUpdate(r.status);
    } catch (e) { setError(e.message); }
    finally { setClassifying(false); }
  }

  const calendarUrl = result?.status === "interview"
    ? `https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent("Interview — " + app.company)}&details=${encodeURIComponent("Role: " + app.title + "\n" + (app.link || ""))}&location=TBD`
    : null;

  const statusColors = { interview: "var(--color-warning)", offer: "var(--color-success)", rejected: "var(--color-danger)" };

  return (
    <div className="detail-section">
      <div className="detail-section-title">HR reply</div>
      <textarea className="field-input" style={{ width: "100%", minHeight: "96px", resize: "vertical", fontFamily: "inherit", fontSize: "var(--text-sm)" }}
        placeholder="Paste the HR reply here…"
        value={text} onChange={e => setText(e.target.value)} />
      <div style={{ display: "flex", gap: "8px", alignItems: "center", marginTop: "8px" }}>
        <button className="btn btn-primary btn-sm" onClick={classify} disabled={classifying || !text.trim()}>
          {classifying ? "Classifying…" : "Classify reply"}
        </button>
        {error && <span style={{ fontSize: "var(--text-xs)", color: "var(--color-danger)" }}>{error}</span>}
      </div>
      {result && (
        <div style={{ marginTop: "12px", padding: "12px 16px", borderRadius: "var(--radius-md)", background: "var(--sand-100)", border: "1px solid var(--color-border)" }}>
          <div style={{ fontSize: "var(--text-sm)", marginBottom: "8px" }}>
            Status updated to <strong style={{ color: statusColors[result.status] }}>{result.status}</strong>
          </div>
          {result.status === "rejected" && (
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-muted)" }}>Application marked as closed.</div>
          )}
          {result.status === "interview" && calendarUrl && (
            <a className="btn btn-secondary btn-sm" href={calendarUrl} target="_blank" rel="noopener noreferrer" style={{ gap: "5px" }}>
              <IconCalendar /> Add interview to Google Calendar
            </a>
          )}
          {result.status === "offer" && (
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-success)", fontWeight: 500 }}>Congratulations! Offer received.</div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Agent Page ────────────────────────────────────────────────────────
function AgentPage() {
  const [running, setRunning] = useState(false);
  const [jobs, setJobs] = useState(null);
  const [error, setError] = useState(null);
  const [generating, setGenerating] = useState(null);
  const [results, setResults] = useState({});

  async function handleRun() {
    setRunning(true); setError(null); setJobs(null); setResults({});
    try {
      const data = await api.run();
      setJobs(data.jobs || []);
    } catch (e) { setError(e.message); }
    finally { setRunning(false); }
  }

  async function handleGenerate(job, idx) {
    setGenerating(idx);
    try {
      const r = await api.generate(job);
      setResults(prev => ({ ...prev, [idx]: r }));
    } catch (e) { setError(e.message); }
    finally { setGenerating(null); }
  }

  return (
    <div className="page-body">
      <div style={{ maxWidth: "700px", display: "flex", flexDirection: "column", gap: "16px" }}>
        <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
          <button className="btn btn-primary" onClick={handleRun} disabled={running} style={{ gap: "6px" }}>
            <IconPlay /> {running ? "Searching…" : "Run agent — find jobs ≥ 8/10"}
          </button>
          {running && (
            <span style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>
              Scraping all sources + LLM scoring top 25… (30–60 s)
            </span>
          )}
        </div>

        {error && <ErrorBanner message={error} />}

        {jobs !== null && jobs.length === 0 && (
          <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-muted)", padding: "16px 0" }}>
            No jobs scored ≥ 8 today. Try again tomorrow or broaden your keywords in <code style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)" }}>config.py</code>.
          </div>
        )}

        {(jobs || []).map((job, idx) => (
          <JobResultCard
            key={idx}
            job={job}
            onGenerate={() => handleGenerate(job, idx)}
            generating={generating === idx}
            result={results[idx]}
          />
        ))}

        {!running && !jobs && (
          <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", padding: "18px 22px", boxShadow: "var(--shadow-xs)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
              <div style={{ color: "var(--terra-400)", display: "flex" }}><IconBrain /></div>
              <div style={{ fontSize: "var(--text-sm)", fontWeight: 600, color: "var(--color-text-primary)" }}>Agent memory</div>
              <div style={{ marginLeft: "auto", fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>agent_memory.md</div>
            </div>
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-secondary)", lineHeight: "var(--leading-relaxed)" }}>
              Memory is written after each run and injected into the next run's system prompt — the agent learns from your past outcomes.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App Root ───────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dashboard");
  const [selected, setSelected] = useState(null);

  const pageTitles = {
    dashboard: "Dashboard", applications: "Applications",
    agent: "Run agent", digest: "Daily digest",
    settings: "Settings", detail: "Application detail",
  };
  const activePage = selected ? "detail" : page;

  function renderPage() {
    if (selected) return <DetailPage app={selected} onBack={() => setSelected(null)} />;
    switch (page) {
      case "dashboard":    return <DashboardPage setPage={setPage} />;
      case "applications": return <ApplicationsPage onSelect={setSelected} />;
      case "agent":        return <AgentPage />;
      case "digest":       return <DigestPage />;
      case "settings":     return <SettingsPage />;
      default:             return <DashboardPage setPage={setPage} />;
    }
  }

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={p => { setSelected(null); setPage(p); }} />
      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{pageTitles[activePage]}</div>
          <div className="topbar-actions">
            <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)", fontFamily: "var(--font-mono)", padding: "4px 10px", background: "var(--sand-100)", borderRadius: "var(--radius-full)", border: "1px solid var(--color-border)" }}>
              localhost:8000
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
