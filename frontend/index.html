<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Agent — Dashboard</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── API client ──────────────────────────────────────────────────────
const API_BASE = "http://localhost:8000";

const api = {
  async getApplications() {
    const r = await fetch(`${API_BASE}/applications`);
    if (!r.ok) throw new Error(`GET /applications ${r.status}`);
    return r.json();
  },
  async getStats() {
    const r = await fetch(`${API_BASE}/stats`);
    if (!r.ok) throw new Error(`GET /stats ${r.status}`);
    return r.json();
  },
  async updateStatus(id, status) {
    const r = await fetch(`${API_BASE}/applications/${id}/status`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
    if (!r.ok) throw new Error(`PATCH /applications/${id}/status ${r.status}`);
    return r.json();
  },
  async addApplication(body) {
    const r = await fetch(`${API_BASE}/applications`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`POST /applications ${r.status}`);
    return r.json();
  },
};

// ── Icons ───────────────────────────────────────────────────────────

);

    <circle cx="8" cy="8" r="2.5"/>
    <path d="M8 1.5v1.8M8 12.7v1.8M1.5 8h1.8M12.7 8h1.8M3.2 3.2l1.3 1.3M11.5 11.5l1.3 1.3M12.8 3.2l-1.3 1.3M4.5 11.5l-1.3 1.3"/>
  </svg>
);
const IconPlus = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2">
    <line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/>
  </svg>
);
const IconSearch = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
    <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
  </svg>
);
const IconExternal = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">

    <line x1="5" y1="5.5" x2="11" y2="5.5"/>
    <line x1="5" y1="8" x2="11" y2="8"/>
    <line x1="5" y1="10.5" x2="8.5" y2="10.5"/>
  </svg>
);
const IconBrain = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M8 14c-3.5 0-5.5-2-5.5-5 0-1.5.5-2.8 1.5-3.7C4 4 4.5 3 5.5 2.5 6 2.2 6.5 2 7 2c.8 0 1 .5 1 1s.2 1 1 1c1 0 1.5-.5 2-.5.8 0 1.5.8 1.5 2 0 .3 0 .5-.1.8.6.6 1.1 1.5 1.1 2.7 0 3-2 5-5.5 5z"/>
  </svg>
);
const IconRefresh = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M13.5 8A5.5 5.5 0 1 1 10 3.1"/><polyline points="10,1 10,4 13,4"/>
  </svg>
);
const IconWarn = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M8 2L1.5 13.5h13z"/><line x1="8" y1="6.5" x2="8" y2="9.5"/><circle cx="8" cy="11.5" r=".5" fill="currentColor"/>
  </svg>
);

// ── Helpers ─────────────────────────────────────────────────────────
function scoreStyle(s) {
  const n = parseFloat(s);
  if (!s || isNaN(n)) return { background: "var(--sand-100)", color: "var(--color-text-muted)" };
  if (n >= 8) return { background: "var(--color-success-soft)", color: "var(--color-success)" };
  if (n >= 5) return { background: "var(--color-warning-soft)", color: "var(--color-warning)" };
  return { background: "var(--color-danger-soft)", color: "var(--color-danger)" };
}

function StatusBadge({ status }) {
  return (
    <div className={`badge badge-${status || "applied"}`}>
      <div className="badge-dot"></div>
      {status || "applied"}
    </div>
  );
}

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="toast">
      <IconCheck /> {message}
    </div>
  );
}

function ErrorBanner({ message, onRetry }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "10px",
      padding: "12px 16px", borderRadius: "var(--radius-md)",
      background: "var(--color-danger-soft)", color: "var(--color-danger)",
      border: "1px solid oklch(55% 0.18 25 / 0.2)",
      fontSize: "var(--text-sm)", marginBottom: "16px",
    }}>
      <IconWarn />
      <span style={{ flex: 1 }}>
        <strong>Cannot reach API</strong> — make sure the backend is running: <code style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)" }}>python -m uvicorn job_agent.api:app --reload</code>
      </span>
      {onRetry && (
        <button className="btn btn-secondary btn-sm" onClick={onRetry} style={{ gap: "5px" }}>
          <IconRefresh /> Retry
        </button>
      )}
    </div>
  );
}

// ── Sidebar ─────────────────────────────────────────────────────────

    { id: "dashboard",    label: "Dashboard",    Icon: IconGrid },
    { id: "applications", label: "Applications", Icon: IconList },
    { id: "agent",        label: "Run agent",    Icon: IconPlay },
    { id: "digest",       label: "Daily digest", Icon: IconFile },
  ];
  return (
    <div className="sidebar">
      <div className="sidebar-brand">
        <div className="brand-mark">
          <div className="brand-icon">
            <svg viewBox="0 0 18 18" fill="none" stroke="white" strokeWidth="1.6">
              <circle cx="9" cy="7" r="3.5"/>
              <path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
              <path d="M12.5 3.5l1.5-1.5M5.5 3.5L4 2M9 2V0.5"/>
            </svg>
          </div>
          <div className="brand-name">Job Agent</div>
        </div>
        <div className="brand-tagline">your search, automated</div>
      </div>
      <div className="nav-section">
        {items.map(({ id, label, Icon }) => (
          <div key={id} className={`nav-item${page === id ? " active" : ""}`} onClick={() => setPage(id)}>
            <Icon />{label}
          </div>
        ))}
      </div>
      <div className="nav-section">
        <div className="nav-section-label">Account</div>
        <div className={`nav-item${page === "settings" ? " active" : ""}`} onClick={() => setPage("settings")}>
          <IconSettings />Settings
        </div>
      </div>
      <div className="sidebar-footer">
        Rodrigo Cerezo<br />
        <span style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)" }}>qwen2.5:14b · local</span>
      </div>
    </div>
  );
}

// ── Dashboard Page ───────────────────────────────────────────────────
function DashboardPage({ setPage }) {
  const [stats, setStats] = useState(null);
  const [apps, setApps] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  async function load() {
    setLoading(true); setError(null);
    try {
      const [s, a] = await Promise.all([api.getStats(), api.getApplications()]);
      setStats(s); setApps(a);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }
  useEffect(() => { load(); }, []);

  const recent = [...apps].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 4);

  if (loading) return <div className="page-body" style={{ color: "var(--color-text-muted)", fontSize: "var(--text-sm)" }}>Loading…</div>;

  return (
    <div className="page-body">
      {error && <ErrorBanner message={error} onRetry={load} />}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">Applications</div>
          <div className="stat-value">{stats?.total ?? apps.length}</div>
          <div className="stat-sub">total logged</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Interview rate</div>
          <div className="stat-value" style={{ color: "var(--color-warning)" }}>{stats?.interview_rate_pct ?? 0}%</div>
          <div className="stat-sub">{stats?.counts?.interview ?? 0} interviews</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Offers</div>
          <div className="stat-value" style={{ color: "var(--color-success)" }}>{stats?.counts?.offer ?? 0}</div>
          <div className="stat-sub">{stats?.offer_rate_pct ?? 0}% offer rate</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pending</div>
          <div className="stat-value" style={{ color: "var(--terra-400)" }}>{stats?.counts?.applied ?? 0}</div>
          <div className="stat-sub">awaiting reply</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
        {/* Pipeline */}
        <div className="pipeline-card">
          <div className="section-title">Pipeline</div>
          {[
            { s: "applied",   color: "var(--color-status-applied)" },
            { s: "interview", color: "var(--color-status-interview)" },
            { s: "offer",     color: "var(--color-status-offer)" },
            { s: "rejected",  color: "var(--color-text-muted)" },
          ].map(({ s, color }) => {
            const n = stats?.counts?.[s] ?? 0;
            const total = stats?.total ?? 1;
            return (
              <div className="pipe-row" key={s}>
                <div className="pipe-name" style={{ color }}>{s}</div>
                <div className="pipe-track">
                  <div className="pipe-fill" style={{ width: `${total ? n / total * 100 : 0}%`, background: color }}></div>
                </div>
                <div className="pipe-count">{n}</div>
              </div>
            );
          })}
        </div>

        {/* Recent */}
        <div className="pipeline-card">
          <div className="section-title">Recent applications</div>
          {recent.length === 0 && (
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-muted)", padding: "8px 0" }}>No applications yet.</div>
          )}
          {recent.map(app => (
            <div key={app.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--color-border)" }}>
              <div>
                <div style={{ fontSize: "var(--text-sm)", fontWeight: 500, color: "var(--color-text-primary)" }}>{app.title}</div>
                <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)" }}>{app.company} · {app.date}</div>
              </div>
              <StatusBadge status={app.status} />
            </div>
          ))}
          <div style={{ marginTop: "12px" }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage("applications")}>View all →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Applications Page ────────────────────────────────────────────────
function ApplicationsPage({ onSelect }) {
  const [apps, setApps] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title: "", company: "", location: "Madrid", source: "manual", link: "" });
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  async function load() {
    setLoading(true); setError(null);
    try { setApps(await api.getApplications()); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }
  useEffect(() => { load(); }, []);

  async function handleStatusChange(id, newStatus) {
    try {
      await api.updateStatus(id, newStatus);
      setApps(apps.map(a => a.id === id ? { ...a, status: newStatus } : a));
      setToast("Status updated");
    } catch (e) { setToast("Error: " + e.message); }
  }

  async function handleAdd() {
    if (!form.title || !form.company) return;
    setSaving(true);
    try {
      const added = await api.addApplication(form);
      setApps(prev => [...prev, added]);
      setShowModal(false);
      setForm({ title: "", company: "", location: "Madrid", source: "manual", link: "" });
      setToast("Application added");
    } catch (e) { setToast("Error: " + e.message); }
    finally { setSaving(false); }
  }

  const filtered = apps.filter(a => {
    const q = search.toLowerCase();
    const matchSearch = !q || a.title?.toLowerCase().includes(q) || a.company?.toLowerCase().includes(q);
    const matchFilter = filter === "all" || a.status === filter;
    return matchSearch && matchFilter;
  });

  return (
    <div className="page-body">
      {error && <ErrorBanner message={error} onRetry={load} />}

      <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, minWidth: "200px" }}>
          <div style={{ position: "absolute", left: "10px", top: "50%", transform: "translateY(-50%)", color: "var(--color-text-muted)", pointerEvents: "none", display: "flex" }}>
            <IconSearch />
          </div>
          <input className="field-input" style={{ paddingLeft: "34px", width: "100%" }} placeholder="Search jobs or companies…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {["all", "applied", "interview", "offer", "rejected"].map(f => (
          <div key={f} className="badge" style={{
            cursor: "pointer", padding: "6px 12px",
            background: filter === f ? "var(--terra-100)" : "var(--color-surface-raised)",
            color: filter === f ? "var(--terra-500)" : "var(--color-text-secondary)",
            border: `1px solid ${filter === f ? "var(--terra-300)" : "var(--color-border)"}`,
          }} onClick={() => setFilter(f)}>{f}</div>
        ))}
        <button className="btn btn-secondary btn-sm" onClick={load} style={{ gap: "5px" }}>
          <IconRefresh /> Refresh
        </button>
      </div>

      {loading ? (
        <div style={{ color: "var(--color-text-muted)", fontSize: "var(--text-sm)" }}>Loading…</div>
      ) : (
        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", overflow: "hidden", boxShadow: "var(--shadow-xs)" }}>
          <table className="data-table">
            <thead>
              <tr><th>Role</th><th>Company</th><th>Score</th><th>Source</th><th>Date</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(app => (
                <tr key={app.id} style={{ cursor: "pointer" }} onClick={() => onSelect(app)}>
                  <td>
                    <div style={{ fontWeight: 500, color: "var(--color-text-primary)" }}>{app.title}</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>{app.location}</div>
                  </td>
                  <td>{app.company}</td>
                  <td>
                    <div style={{ ...scoreStyle(app.score), width: "36px", height: "28px", borderRadius: "var(--radius-sm)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: "var(--text-sm)" }}>
                      {app.score || "—"}
                    </div>
                  </td>
                  <td><div className="source-badge">{app.source}</div></td>
                  <td style={{ color: "var(--color-text-muted)", fontSize: "var(--text-xs)" }}>{app.date}</td>
                  <td>
                    <select className="field-input" style={{ padding: "4px 8px", fontSize: "var(--text-xs)", width: "auto" }}
                      value={app.status || "applied"}
                      onClick={e => e.stopPropagation()}
                      onChange={e => { e.stopPropagation(); handleStatusChange(app.id, e.target.value); }}>
                      {["applied", "interview", "offer", "rejected"].map(s => <option key={s}>{s}</option>)}
                    </select>
                  </td>
                  <td>
                    <button className="btn-icon" onClick={e => { e.stopPropagation(); onSelect(app); }}>
                      <IconDoc />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length === 0 && (
            <div className="empty-state">
              <div className="empty-state-title">No applications found</div>
              <div className="empty-state-desc">{apps.length === 0 ? "Run the agent or add one manually." : "Try adjusting your filter."}</div>
            </div>
          )}
        </div>
      )}

      {/* Add modal */}
      {showModal && (
        <div className="modal-backdrop" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Add application</div>
            <div className="field">
              <div className="field-label">Job title *</div>
              <input className="field-input" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="AI Engineer" />
            </div>
            <div className="field">
              <div className="field-label">Company *</div>
              <input className="field-input" value={form.company} onChange={e => setForm({ ...form, company: e.target.value })} placeholder="Company name" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <div className="field">
                <div className="field-label">Location</div>
                <input className="field-input" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} />
              </div>
              <div className="field">
                <div className="field-label">Source</div>
                <select className="field-input" value={form.source} onChange={e => setForm({ ...form, source: e.target.value })}>
                  {["manual", "linkedin", "remotive", "infojobs", "tecnoempleo", "arbeitnow", "landing.jobs"].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="field">
              <div className="field-label">Job link</div>
              <input className="field-input" value={form.link} onChange={e => setForm({ ...form, link: e.target.value })} placeholder="https://…" />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAdd} disabled={saving || !form.title || !form.company}>
                {saving ? "Saving…" : "Add application"}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}

      <button className="btn btn-primary"
        style={{ position: "fixed", bottom: "24px", right: "24px", borderRadius: "var(--radius-full)", boxShadow: "var(--shadow-lg)", padding: "12px 20px", gap: "6px" }}
        onClick={() => setShowModal(true)}>
        <IconPlus /> Add application
      </button>
    </div>
  );
}

// ── Detail Page ───────────────────────────────────────────────────────
function DetailPage({ app, onBack }) {
  if (!app) return null;
  const folderName = app.folder_path ? app.folder_path.split(/[/\\]/).pop() : null;

  return (
    <div className="page-body">
      <div style={{ marginBottom: "16px" }}>
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Back</button>
      </div>
      <div className="detail-panel">
        <div className="detail-header">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "12px" }}>
            <div>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "var(--text-xl)", color: "var(--color-text-primary)", marginBottom: "4px" }}>{app.title}</div>
              <div style={{ fontSize: "var(--text-base)", color: "var(--color-text-secondary)" }}>{app.company}{app.location ? ` · ${app.location}` : ""}</div>
            </div>
            {app.score && (
              <div style={{ ...scoreStyle(app.score), width: "48px", height: "48px", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: "var(--text-lg)", flexShrink: 0 }}>
                {app.score}
              </div>
            )}
          </div>
          <div style={{ display: "flex", gap: "8px", marginTop: "12px", flexWrap: "wrap", alignItems: "center" }}>
            <StatusBadge status={app.status} />
            {app.source && <div className="source-badge">{app.source}</div>}
            {app.salary && app.salary !== "—" && (
              <div className="badge" style={{ background: "var(--sand-100)", color: "var(--color-text-secondary)", border: "1px solid var(--color-border)" }}>{app.salary}</div>
            )}
            <div style={{ marginLeft: "auto", fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>Applied {app.date}</div>
          </div>
        </div>
        <div className="detail-body">
          {app.reason && (
            <div className="detail-section">
              <div className="detail-section-title">LLM scoring reason</div>
              <div style={{ padding: "12px 14px", background: "var(--color-surface)", borderRadius: "var(--radius-md)", borderLeft: "3px solid var(--terra-300)", fontSize: "var(--text-sm)", color: "var(--color-text-body)", lineHeight: "var(--leading-relaxed)" }}>
                {app.reason}
              </div>
            </div>
          )}
          <div className="detail-section">
            <div className="detail-section-title">Application folder</div>
            {folderName ? (
              <>
                <div style={{ fontSize: "var(--text-xs)", fontFamily: "var(--font-mono)", color: "var(--color-text-muted)", marginBottom: "10px", padding: "6px 10px", background: "var(--sand-100)", borderRadius: "var(--radius-sm)", border: "1px solid var(--color-border)" }}>
                  applications/{folderName}/
                </div>
                {["job_offer.md", "company_research.md", "interview_prep.md", "cv_custom.pdf", "cover_letter.pdf", "notes.md"].map(f => (
                  <div className="doc-item" key={f}>
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                      <div style={{ color: "var(--color-text-muted)", display: "flex" }}><IconDoc /></div>
                      <div className="doc-name">{f}</div>
                    </div>
                    <div className="doc-meta">{f.endsWith(".pdf") ? "PDF" : "Markdown"}</div>
                  </div>
                ))}
              </>
            ) : (
              <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-muted)" }}>No folder path recorded for this application.</div>
            )}
          </div>
          {app.link && app.link !== "#" && (
            <div className="detail-section">
              <div className="detail-section-title">Actions</div>
              <div style={{ display: "flex", gap: "8px" }}>
                <a className="btn btn-secondary" href={app.link} target="_blank" rel="noopener noreferrer" style={{ gap: "6px" }}>
                  <IconExternal /> Open job link
                </a>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Agent Page ────────────────────────────────────────────────────────

    <div className="page-body">
      <div style={{ maxWidth: "680px" }}>
        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-xl)", border: "1px solid var(--color-border)", overflow: "hidden", boxShadow: "var(--shadow-md)" }}>
          <div style={{ padding: "20px 24px", borderBottom: "1px solid var(--color-border)", background: "var(--sand-100)" }}>
            <div style={{ fontSize: "var(--text-sm)", fontWeight: 500, color: "var(--color-text-primary)", marginBottom: "6px" }}>Agent is CLI-only for now</div>
            <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-secondary)", lineHeight: "var(--leading-relaxed)" }}>
              Run the agent from your terminal. Results will appear in the Applications tab automatically.
            </div>
          </div>
          <div style={{ padding: "20px 24px", fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)", background: "var(--ink-900)", color: "var(--sand-300)", lineHeight: "1.9" }}>
            <div style={{ color: "var(--sand-400)" }}># Standard pipeline</div>
            <div>python main.py</div>
            <div style={{ marginTop: "12px", color: "var(--sand-400)" }}># Agent loop (LLM drives tool calls)</div>
            <div>python main.py  <span style={{ color: "var(--terra-300)" }}># uses agent.py internally</span></div>
            <div style={{ marginTop: "12px", color: "var(--sand-400)" }}># Skip confirmation prompts</div>
            <div>python main.py --auto</div>
            <div style={{ marginTop: "12px", color: "var(--sand-400)" }}># Daily digest (top 5, no LLM)</div>
            <div>python -m job_agent.digest</div>
            <div style={{ marginTop: "12px", color: "var(--sand-400)" }}># Start API server (this dashboard)</div>
            <div>uvicorn job_agent.api:app --reload</div>
          </div>
        </div>
        <div style={{ marginTop: "16px", background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", padding: "18px 22px", boxShadow: "var(--shadow-xs)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
            <div style={{ color: "var(--terra-400)", display: "flex" }}><IconBrain /></div>
            <div style={{ fontSize: "var(--text-sm)", fontWeight: 600, color: "var(--color-text-primary)" }}>Agent memory</div>
            <div style={{ marginLeft: "auto", fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>agent_memory.md</div>
          </div>
          <div style={{ fontSize: "var(--text-sm)", color: "var(--color-text-secondary)", lineHeight: "var(--leading-relaxed)" }}>
            Memory is written to <code style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)", background: "var(--sand-100)", padding: "1px 5px", borderRadius: "3px" }}>agent_memory.md</code> after each run and injected into the agent's system prompt on the next run.
          </div>
        </div>
      </div>
    </div>
  );
}

        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-xl)", border: "1px solid var(--color-border)", overflow: "hidden", boxShadow: "var(--shadow-md)" }}>
          <div style={{ padding: "20px 24px", borderBottom: "1px solid var(--color-border)", background: "var(--amber-100)", display: "flex", alignItems: "center", gap: "10px" }}>
            <div style={{ color: "var(--amber-500)", display: "flex" }}><IconFile /></div>
            <div>
              <div style={{ fontSize: "var(--text-sm)", fontWeight: 500, color: "var(--color-text-primary)" }}>Daily digest</div>
              <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)" }}>Keyword-scored · no LLM · top 5 new offers</div>

          </div>

            <div style={{ color: "var(--sand-400)" }}># Generate today's digest</div>

// ── Settings Page ──────────────────────────────────────────────────────
function SettingsPage() {
  const [tone, setTone] = useState("formal");
  const [saved, setSaved] = useState(false);

  function save() { setSaved(true); setTimeout(() => setSaved(false), 2000); }

  return (
    <div className="page-body">
      <div style={{ maxWidth: "520px", display: "flex", flexDirection: "column", gap: "16px" }}>
        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", padding: "20px 24px", boxShadow: "var(--shadow-xs)" }}>
          <div className="section-title">API connection</div>
          <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 12px", background: "var(--color-surface)", borderRadius: "var(--radius-md)", border: "1px solid var(--color-border)", marginBottom: "10px" }}>
            <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: "var(--color-success)", flexShrink: 0 }}></div>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: "var(--text-xs)", color: "var(--color-text-secondary)" }}>http://localhost:8000</div>
          </div>
          <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)" }}>
            Change the API base URL by editing <code style={{ fontFamily: "var(--font-mono)" }}>API_BASE</code> at the top of <code style={{ fontFamily: "var(--font-mono)" }}>index.html</code>.
          </div>
        </div>

        <div style={{ background: "var(--color-surface-raised)", borderRadius: "var(--radius-lg)", border: "1px solid var(--color-border)", padding: "20px 24px", boxShadow: "var(--shadow-xs)" }}>
          <div className="section-title">Cover letter tone</div>
          <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)", marginBottom: "10px" }}>
            This mirrors the <code style={{ fontFamily: "var(--font-mono)" }}>TONE</code> setting in <code style={{ fontFamily: "var(--font-mono)" }}>config.py</code>. Update the file directly to persist.
          </div>
          <div style={{ display: "flex", gap: "6px" }}>
            {["formal", "direct", "startup"].map(t => (
              <div key={t} style={{
                padding: "7px 14px", borderRadius: "var(--radius-full)",
                border: `1px solid ${tone === t ? "var(--terra-300)" : "var(--color-border)"}`,
                background: tone === t ? "var(--terra-100)" : "var(--color-surface-raised)",
                color: tone === t ? "var(--terra-500)" : "var(--color-text-secondary)",
                fontSize: "var(--text-sm)", fontWeight: 500, cursor: "pointer",
                transition: "all var(--duration-fast) var(--ease-out)",
              }} onClick={() => setTone(t)}>{t}</div>
            ))}
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end", gap: "8px", alignItems: "center" }}>
          {saved && <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "var(--text-sm)", color: "var(--color-success)" }}><IconCheck />Saved</div>}
          <button className="btn btn-primary" onClick={save}>Save settings</button>
        </div>
      </div>
    </div>
  );
}

// ── App Root ───────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dashboard");
  const [selected, setSelected] = useState(null);

  const pageTitles = {
    dashboard: "Dashboard", applications: "Applications",
    agent: "Run agent", digest: "Daily digest",
    settings: "Settings", detail: "Application detail",
  };
  const activePage = selected ? "detail" : page;

  function renderPage() {
    if (selected) return <DetailPage app={selected} onBack={() => setSelected(null)} />;
    switch (page) {
      case "dashboard":    return <DashboardPage setPage={setPage} />;
      case "applications": return <ApplicationsPage onSelect={setSelected} />;
      case "agent":        return <AgentPage />;
      case "digest":       return <DigestPage />;
      case "settings":     return <SettingsPage />;
      default:             return <DashboardPage setPage={setPage} />;
    }
  }

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={p => { setSelected(null); setPage(p); }} />
      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{pageTitles[activePage]}</div>
          <div className="topbar-actions">
            <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-muted)", fontFamily: "var(--font-mono)", padding: "4px 10px", background: "var(--sand-100)", borderRadius: "var(--radius-full)", border: "1px solid var(--color-border)" }}>
              localhost:8000
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
